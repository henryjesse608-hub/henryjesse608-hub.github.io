<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=divice-width, initial-scale=1">
        <title>Register</title>
        <link rel="stylesheet" type="text/css" href="css/index.css">
    </head>
        <body>
            <div class="main">
                <div class="logo">
                    <img src="assests/logo.png" alt="logo">
                </div>
                <div class="card">
                    <h2>Create New Account</h2>
                    <form enctype="multipart/form-data">
                        <div class="form-group">
                            <label>Enter First name</label>
                            <input type="name=" placeholder="Enter first name">

                        </div>
                        <div class="form-group">
                            <label>Enter Last name</label>
                            <input type="name=" placeholder="Enter last name">
                        </div>
                        <div class="form-group">
                            <label>Enter Email</label>
                            <input type="name=" placeholder="example@gmail.com"> 
                             
                        </div>
                        <div class="form-group">
                            <label>Enter Password</label>
                                <input type="password" name=""placeholder="******">
                           
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                                <input type="password" name=""placeholder="******">
                           
                        </div>
                       
                           
                        <button class="btn-primary">Create Account</button>
                        <button class="btn-register"><a href="index.html">Already have an account log in now</a></button>
                    </form>

                </div>
            </div>
             
        </body>
</html>
